on:
  pull_request:
  push:
    branches: [main]
env:
  DOTNET_NOLOGO: true
jobs:
  build:
    name: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@3951f0dfe7a07e2313ec93c75700083e2005cbab # v4
      - run: dotnet tool restore
      - run: dotnet fable src